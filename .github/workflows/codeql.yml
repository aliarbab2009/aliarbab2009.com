name: CodeQL

# GitHub-hosted SAST. Scans for security antipatterns (XSS sinks,
# unsafe innerHTML, prototype pollution, regex DoS, etc.) on every
# push to main and every PR, plus a weekly Monday rescan that
# catches issues exposed by newer CodeQL queries.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC — staggered from Dependabot (06:00) so
    # they don't compete for the same Actions minutes window.
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write # required to upload SARIF results
      actions: read

    strategy:
      fail-fast: false
      matrix:
        # Single unified identifier (CodeQL ≥ 2.16). Don't split into
        # separate javascript + typescript matrices — that's the old form.
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0499de31b99561a6d14a36a5f662c2a54f91beee # v3.30.10
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@0499de31b99561a6d14a36a5f662c2a54f91beee # v3.30.10

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0499de31b99561a6d14a36a5f662c2a54f91beee # v3.30.10
        with:
          category: "/language:${{ matrix.language }}"
