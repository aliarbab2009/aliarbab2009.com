name: Lighthouse CI

# Runs on PRs only. main pushes skip — Vercel's own Speed Insights covers
# RUM for production traffic; LHCI is for catching regressions before merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://aliarbab2009.com
        run: pnpm build

      - name: Run Lighthouse CI
        # @lhci/cli is a devDependency in package.json; pnpm dlx avoids
        # re-resolving on every run. The ./lighthouserc.json at repo root
        # is the canonical config.
        run: pnpm dlx @lhci/cli@0.14.x autorun

      - name: Upload Lighthouse artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-${{ github.run_id }}
          path: |
            .lighthouseci
            !**/.env*
          retention-days: 14
          if-no-files-found: warn
